id: com.github.bhh32.GuiScaleApplet
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: gui-scale-applet
finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=/usr/bin/tailscale:ro
  - --filesystem=/var/run/tailscale:rw

modules:
  - name: libappindicator
    buildsystem: simple
    build-commands:
      - dpkg -i libappindicator_12.10.1+20.10.20200706.3.1_12.10.1+20.10.20200706.1-0ubuntu5_amd64.deb
    sources:
      - type: archive
        url: https://launchpad.net/ubuntu/+archive/primary/+files/libappindicator3-1_12.10.1+20.10.20200706.1-0ubuntu5_amd64.deb
        sha256: 88024131ca1c95b4ace960f662cb54cacc722225fd0ea4f69ab35a8f73cb82e2

  - name: gui-scale-applet
    buildsystem: simple
    build-commands:
      - cargo build --release --target-dir=/app/bin
      - install -Dm644 data/share/applications/*.desktop /app/share/applications/
      - install -Dm644 data/icons/hicolor/128x128/apps/*.png /app/share/icons/scalable/apps/
    sources:
      - type: git
        url: https://github.com/cosmic-utils/gui-scale-applet.git
        branch: flatpak
