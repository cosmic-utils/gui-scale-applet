id: com.github.bhh32.GuiScaleApplet
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: gui-scale-applet
finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=system-bus
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=/usr/bin/tailscale:ro
  - --filesystem=/var/run/tailscale:rw

build-options:
  append-path: "/usr/lib/sdk/rust-stable/bin"
  build-args:
    - --share=network
    - --socket=system-bus
  env:
    CARGO_HOME: "/run/build/gui-scale-applet/cargo"
    RUSTUP_HOME: "/run/build/gui-scale-applet/rustup"

modules:
  - name: gnome-common
    buildsystem: autotools
    config-opts:
      - --prefix=/app
    sources:
      - type: archive
        url: https://download.gnome.org/sources/gnome-common/3.18/gnome-common-3.18.0.tar.xz
        sha256: 22569e370ae755e04527b76328befc4c73b62bfd4a572499fde116b8318af8cf

  - name: gtk3
    buildsystem: simple
    build-commands:
      - echo "GTK module is included as a pre-built dependency"
    sources:
      - type: git
        url: https://github.com/flathub/shared-modules.git
        tag: master
        path: gtk/gtk3
    
  - name: gtk2
    buildsystem: simple
    build-commands:
      - echo "GTK2 module is included as a pre-built dependency"
    sources:
      - type: git
        url: https://github.com/flathub/shared-modules.git
        tag: master
        path: gtk/gtk2
    
  - name: libdbusmenu
    buildsystem: simple
    build-commands:
      - echo "libdbusmenu module is included as a pre-built dependency"
    sources:
      - type: git
        url: https://github.com/flathub/shared-modules.git
        tag: master
        path: libdbusmenu

  - name: libappindicator
    buildsystem: simple
    build-commands:
      - echo "libappindicator module is included as a pre-built dependency"
    sources:
      - type: git
        url: https://github.com/flathub/shared-modules.git
        tag: master
        path: libappindicator

  - name: gui-scale-applet
    buildsystem: simple
    build-commands:
      - pwd
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/icons/scalable/apps
      - mkdir -p /app/bin
      - source /usr/lib/sdk/rust-stable/enable.sh
      - cargo build --release --target-dir app/bin
      - install -Dm755 target/release/gui-scale-applet /app/bin/gui-scale-applet
      - install -Dm644 data/*.desktop /app/share/applications/
      - install -Dm644 data/icons/scalable/apps/*.png /app/share/icons/scalable/apps/
    sources:
      - type: dir
        path: ../../
      - type: dir
        path: /home/bryan/.cargo
        dest: cargo
      - type: git
        url: https://github.com/cosmic-utils/gui-scale-applet.git
        branch: flatpak